name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/heads/hotfix-') && !startsWith(github.ref, 'refs/tags/') }}

env:
  REGISTRY: docker.io
  IMAGE_NAME: simplito/privmx-bridge

jobs:
  checks:
    name: Lint & unit tests (${{ matrix.platform }})
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.22.3"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate API docs
        run: npm run gen-docs

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  e2e_tests:
    name: E2E tests (${{ matrix.platform }})
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    env:
      MONGO_URL: mongodb://mongodb:27017
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.22.3"
          cache: npm

      - name: Start MongoDB with replica set
        run: |
          echo "127.0.0.1 mongodb" | sudo tee -a /etc/hosts
          docker run -d -p 27017:27017 --name mongodb --hostname mongodb mongo:8.0 \
            --replSet rs0 --bind_ip_all
          until docker exec mongodb mongosh --quiet --eval "db.adminCommand('ping').ok" | grep -q 1; do sleep 1; done
          docker exec mongodb mongosh --quiet --eval \
            "rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]})"
          until docker exec mongodb mongosh --quiet --eval "db.hello().isWritablePrimary" | grep -q true; do sleep 1; done

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate API docs
        run: npm run gen-docs

      - name: Run E2E tests
        run: npm run e2e-tests

  build:
    name: Build (${{ matrix.platform }})
    needs: [checks, e2e_tests]
    if: github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/heads/hotfix-') && !startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Compute build metadata
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            VERSION=${{ env.APP_VERSION }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

  build_and_push:
    name: Build & push (${{ matrix.platform }})
    needs: [checks, e2e_tests]
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/hotfix-')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Compute build metadata
        run: |
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ env.APP_VERSION }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  create_multiarch:
    name: Create multiarch manifest
    needs: build_and_push
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/hotfix-')
    runs-on: ubuntu-latest
    steps:
      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create -t "$REGISTRY/$IMAGE_NAME:$SHORT_SHA" \
            $(printf "$REGISTRY/$IMAGE_NAME@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "$REGISTRY/$IMAGE_NAME:$SHORT_SHA"

  tag_release:
    name: Tag release image
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Retag image with git tag (+ :latest on stable releases)
        run: |
          SRC="$REGISTRY/$IMAGE_NAME:$SHORT_SHA"
          docker manifest inspect "$SRC"
          TAGS=(-t "$REGISTRY/$IMAGE_NAME:${GITHUB_REF_NAME}")
          # Only stable semver tags (no -rc/-beta/-... suffix) update :latest.
          if [[ "$GITHUB_REF_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAGS+=(-t "$REGISTRY/$IMAGE_NAME:latest")
          fi
          docker buildx imagetools create "${TAGS[@]}" "$SRC"
